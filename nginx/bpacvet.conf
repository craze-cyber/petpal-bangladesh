# /etc/nginx/sites-available/bpacvet.conf
# Symlink:  ln -s /etc/nginx/sites-available/bpacvet.conf /etc/nginx/sites-enabled/
# Then:     nginx -t && systemctl reload nginx
#
# This config reverse-proxies bpacvet.com → Node app on 127.0.0.1:3000
# Certbot will inject SSL blocks automatically (see VPS-SETUP.md).

server {
    listen 80;
    listen [::]:80;
    server_name bpacvet.com www.bpacvet.com;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → Node (TanStack Start SSR)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # Long-cache hashed static assets
    location /_build/ {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    client_max_body_size 20M;
}
